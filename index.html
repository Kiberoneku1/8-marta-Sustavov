<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Интерактивное поздравление</title>
    <style>
        body {
            font-family: sans-serif;
            text-align: center;
            margin-top: 50px;
            background: #fff9f9;
            overflow-x: hidden;
        }
        input, select, button {
            font-size: 16px;
            padding: 8px 12px;
            margin: 5px;
            border-radius: 8px;
            border: 1px solid #d48c9c;
        }
        button {
            background: #d48c9c;
            color: white;
            cursor: pointer;
            border: none;
        }
        button:hover {
            background: #b86b7c;
        }
        #output {
            margin-top: 30px;
            font-size: 24px;
            color: #a34e5e;
            font-weight: bold;
        }
        .confetti {
            position: fixed;
            top: -10px;
            width: 10px;
            height: 10px;
            background: #f7a1b5;
            opacity: 0.8;
            border-radius: 50%;
            pointer-events: none;
            animation: fall linear forwards;
        }
        @keyframes fall {
            to {
                transform: translateY(100vh) rotate(720deg);
                opacity: 0;
            }
        }
    </style>
</head>
<body>
    <h1>🌷 Создай поздравление 🌷</h1>
    <input type="text" id="name" placeholder="Имя" autocomplete="off">
    <select id="role">
        <option value="Мама">Мама</option>
        <option value="Сестра">Сестра</option>
    </select>   
    <button onclick="generate()">Создать</button>
    <div id="output"></div>

    <script src="script.js"></script>
</body>
</html>
